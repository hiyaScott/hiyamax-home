<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaxJunk 4MB 压缩测试</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #1a1a2e;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #6366f1;
    }
    .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .player-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      background: #1a1a2e;
      border-radius: 8px;
      font-size: 13px;
    }
    .status.ok { border-left: 3px solid #22c55e; }
    .status.warn { border-left: 3px solid #f59e0b; }
    .status.error { border-left: 3px solid #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 MaxJunk 压缩测试页面</h1>
    <p class="subtitle">目标：4MB · 当前：4.3MB · 音频 MP3 + PNG 优化</p>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value">4.3MB</div>
        <div class="stat-label">压缩后大小</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">67.5%</div>
        <div class="stat-label">体积缩减</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">23/24</div>
        <div class="stat-label">WAV→MP3</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">27</div>
        <div class="stat-label">PNG 优化</div>
      </div>
    </div>

    <div class="player-wrapper">
      <iframe
        src="https://turbowarp.org/embed.html#project_url=https://hiyascott.github.io/hiyamax-home/games/maxjunk/play/test/game.sb3"
        allowtransparency="true"
        allowfullscreen
        scrolling="no"
        frameborder="0"
      ></iframe>
    </div>

    <div class="status ok" id="status">
      ✅ SB3 文件已验证：69个资源全部存在，31个sprites，45个音频，49个图像
    </div>
  </div>
</body>
</html>
