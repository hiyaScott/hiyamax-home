<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:">
  <title>Taking care of SPACE JUNK</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      width: 100%;
      height: 100%;
      max-width: 480px;
      max-height: 360px;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      text-align: center;
      z-index: 100;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      color: #ff4444;
      padding: 20px;
      text-align: center;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading SPACE JUNK...</div>
  </div>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/@turbowarp/scaffolding@0.3.0/dist/scaffolding-min.js"></script>
  <script>
    (async function() {
      const app = document.getElementById('app');
      const loading = document.getElementById('loading');

      try {
        const scaffolding = new Scaffolding.Scaffolding();
        scaffolding.width = 480;
        scaffolding.height = 360;
        scaffolding.fullscreenMode = 'window-size';

        // Attach to DOM first
        app.appendChild(scaffolding.root);

        // Load project as ArrayBuffer
        loading.innerHTML = '<div>Downloading game data...</div>';
        const response = await fetch('https://hiyascott.github.io/hiyamax-home/games/maxjunk/play/test/game.sb3');
        const arrayBuffer = await response.arrayBuffer();

        // Load the project
        await scaffolding.vm.loadProject(arrayBuffer);

        loading.style.display = 'none';
        scaffolding.start();
      } catch (err) {
        console.error(err);
        loading.innerHTML = '<div class="error">Failed to load game:<br>' + err.message + '</div>';
      }
    })();
  </script>
</body>
</html>
