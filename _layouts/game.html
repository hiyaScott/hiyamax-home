---
layout: default
---

<!-- Game Breadcrumb -->
<nav class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="{{ '/games/' | relative_url }}">Games</a>
    <span class="breadcrumb-separator">></span>
    <span class="breadcrumb-current">{{ page.title }}</span>
  </div>
</nav>

<!-- Game Container -->
<div class="game-page">
  <div class="game-wrapper">
    <div class="game-container">
      {{ content }}
    </div>
  </div>
</div>

<!-- Footer - Match Homepage EXACTLY -->
<footer class="footer game-footer">

    </nav>
    <div class="footer-copyright">© 2025 HiyaMax. All rights reserved.</div>

  </div>

</footer>

<style>
  /* Breadcrumb */
  .breadcrumb {
    background: #fff;
    border-bottom: 1px solid #eee;
    padding-top: var(--header-height);
  }
  
  .breadcrumb-inner {
    max-width: var(--max-content-width);
    margin: 0 auto;
    padding: 12px 40px;
    font-size: 14px;
  }
  
  .breadcrumb a {
    color: #666;
    text-decoration: none;
  }
  
  .breadcrumb a:hover { color: #000; }
  
  .breadcrumb-separator {
    margin: 0 8px;
    color: #999;
  }
  
  .breadcrumb-current {
    color: #000;
    font-weight: 500;
  }
  
  /* Game Page */
  .game-page {
    max-width: var(--max-content-width);
    margin: 0 auto;
    padding: 40px;
    min-height: calc(100vh - var(--header-height) - 200px);
  }
  
  .game-wrapper {
    max-width: 600px;
    margin: 0 auto;
  }
  
  .game-container {
    background: transparent;
    border-radius: 20px;
    padding: 40px;
  }
  
  /* Code blocks - ensure visibility on transparent background */
  .game-container pre {
    background: #f8f8f8;
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
  }
  
  .game-container code {
    background: rgba(0,0,0,0.05);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Monaco', 'Consolas', monospace;
    font-size: 14px;
  }
  
  .game-container pre code {
    background: transparent;
    padding: 0;
  }
  
  /* Game Footer - Match Homepage */
  .game-footer {
    background: #fff;
    padding: 30px 40px;
    padding-bottom: calc(30px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid #eee;
    margin-top: 0;
  }
  
  .game-footer .footer-inner {
    max-width: var(--max-content-width);
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .game-footer .footer-nav {
    display: flex;
    gap: 24px;
  }
  
  .game-footer .footer-nav a {
    color: var(--color-text-light);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }
  
  .game-footer .footer-nav a:hover { color: #000; }
  
  .game-footer .footer-copyright {
    font-size: 13px;
    color: var(--color-text-light);
  }
  
  .game-footer .footer-social {
    display: flex;
    gap: 16px;
  }
  
  .game-footer .footer-social-link {
    color: var(--color-text-light);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: color 0.2s;
  }
  
  .game-footer .footer-social-link:hover { color: #000; }
  
  .game-footer .footer-version {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #999;
  }
  
  @media (max-width: 768px) {
    .game-footer {
      padding: 20px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
    }
    
    .game-footer .footer-inner {
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
  }
  
  @media (max-width: 640px) {
    .game-page { padding: 20px; }
    .game-container { padding: 25px; }
    .breadcrumb-inner { padding: 12px 20px; }
  }
</style>
