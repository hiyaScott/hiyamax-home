---
layout: default
---

<!-- Game Breadcrumb -->
<nav class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="{{ '/games/' | relative_url }}">Games</a>
    <span class="breadcrumb-separator">></span>
    <span class="breadcrumb-current">{{ page.title }}</span>
  </div>
</nav>

<!-- Game Container -->
<div class="game-page">
  <div class="game-wrapper">
    <div class="game-container">
      {{ content }}
    </div>
  </div>
</div>

<style>
  /* Game Detail Page - Dark Theme */
  html, body {
    background: #0f172a;
    min-height: 100vh;
  }
  
  /* Breadcrumb - Dark */
  .breadcrumb {
    background: #1e293b;
    border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    padding-top: var(--header-height);
  }
  
  .breadcrumb-inner {
    max-width: var(--max-content-width);
    margin: 0 auto;
    padding: 12px 40px;
    font-size: 14px;
  }
  
  .breadcrumb a {
    color: #94a3b8;
    text-decoration: none;
  }
  
  .breadcrumb a:hover { color: #fff; }
  
  .breadcrumb-separator {
    margin: 0 8px;
    color: #64748b;
  }
  
  .breadcrumb-current {
    color: #fff;
    font-weight: 500;
  }
  
  /* Game Page - Transparent */
  .game-page {
    max-width: var(--max-content-width);
    margin: 0 auto;
    padding: 40px;
    min-height: calc(100vh - var(--header-height) - 200px);
    background: transparent;
  }
  
  .game-wrapper {
    max-width: 600px;
    margin: 0 auto;
    background: transparent;
  }
  
  .game-container {
    background: transparent;
    border-radius: 20px;
    padding: 40px;
  }
  
  /* Code blocks - Dark theme */
  .game-container pre {
    background: #1e293b;
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    color: #e2e8f0;
  }
  
  .game-container code {
    background: rgba(148, 163, 184, 0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Monaco', 'Consolas', monospace;
    font-size: 14px;
    color: #38bdf8;
  }
  
  .game-container pre code {
    background: transparent;
    padding: 0;
    color: #e2e8f0;
  }
  
  /* Regular text in game content */
  .game-container {
    color: #f8fafc;
  }
  
  .game-container h1,
  .game-container h2,
  .game-container h3 {
    color: #f8fafc;
  }
  
  .game-container p {
    color: #94a3b8;
  }
  
  /* Game Footer - Dark theme to match game */
  .footer {
    background: transparent;
    padding: 30px 40px;
    padding-bottom: calc(30px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid rgba(148, 163, 184, 0.2);
    margin-top: 0;
  }
  
  .footer .footer-inner {
    max-width: var(--max-content-width);
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .footer .footer-nav {
    display: flex;
    gap: 24px;
  }
  
  .footer .footer-nav a {
    color: #94a3b8;
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }
  
  .footer .footer-nav a:hover { color: #fff; }
  
  .footer .footer-copyright {
    font-size: 13px;
    color: #64748b;
  }
  
  .footer .footer-social {
    display: flex;
    gap: 16px;
  }
  
  .footer .footer-social-link {
    color: #94a3b8;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: color 0.2s;
  }
  
  .footer .footer-social-link:hover { color: #fff; }
  
  .footer .footer-version {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #475569;
  }
  
  @media (max-width: 768px) {
    .footer {
      padding: 20px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
    }
    
    .footer .footer-inner {
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
  }
  
  @media (max-width: 640px) {
    .game-page { padding: 20px; }
    .game-container { padding: 25px; }
    .breadcrumb-inner { padding: 12px 20px; }
  }
</style>
