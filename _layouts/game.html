---
layout: default
---

<!-- Game Breadcrumb -->
<nav class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="{{ '/games/' | relative_url }}">Games</a>
    <span class="breadcrumb-separator">></span>
    <span class="breadcrumb-current">{{ page.title }}</span>
  </div>
</nav>

<!-- Game Container -->
<div class="game-page">
  <div class="game-wrapper">
    <div class="game-container">
      {{ content }}
    </div>
  </div>
</div>

<style>
  /* Game Detail Page - Light Theme */
  html, body {
    background: #f8fafc;
    min-height: 100vh;
  }
  
  /* Breadcrumb - Light */
  .breadcrumb {
    background: #fff;
    border-bottom: 1px solid #eee;
    padding-top: var(--header-height);
  }
  
  .breadcrumb-inner {
    max-width: var(--max-content-width);
    margin: 0 auto;
    padding: 12px 40px;
    font-size: 14px;
  }
  
  .breadcrumb a {
    color: #666;
    text-decoration: none;
  }
  
  .breadcrumb a:hover { color: #000; }
  
  .breadcrumb-separator {
    margin: 0 8px;
    color: #999;
  }
  
  .breadcrumb-current {
    color: #333;
    font-weight: 500;
  }
  
  /* Game Page - Light background */
  .game-page {
    max-width: var(--max-content-width);
    margin: 0 auto;
    min-height: calc(100vh - var(--header-height) - 200px);
    background: #f8fafc;
  }
  
  .game-wrapper {
    max-width: 800px;
    margin: 0 auto;
    background: transparent;
  }
  
  .game-container {
    background: transparent;
    border-radius: 20px;
    padding: 0 40px 40px;
  }
  
  /* Hero banner full-width breakout */
  .game-container .wa-hero-wrapper {
    width: calc(100% + 80px);
    max-width: none;
    margin: 0 -40px;
    position: relative;
    left: 0;
    overflow: hidden;
  }
  
  .game-container .wa-hero-wrapper img {
    width: 100%;
    height: auto;
    display: block;
  }
  
  /* Code blocks - Light theme */
  .game-container pre {
    background: #1e293b;
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    color: #e2e8f0;
  }
  
  .game-container code {
    background: rgba(0, 0, 0, 0.05);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Monaco', 'Consolas', monospace;
    font-size: 14px;
    color: #333;
  }
  
  .game-container pre code {
    background: transparent;
    padding: 0;
    color: #e2e8f0;
  }
  
  /* Regular text in game content - Dark text for light background */
  .game-container {
    color: #333;
  }
  
  .game-container h1,
  .game-container h2,
  .game-container h3 {
    color: #111;
  }
  
  .game-container p {
    color: #666;
  }
  
  /* Game Footer - White background */
  .footer {
    background: #fff;
    padding: 30px 40px 60px;
    border-top: 1px solid #eee;
    margin-top: 0;
  }
  
  .footer .footer-inner {
    max-width: var(--max-content-width);
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .footer .footer-nav {
    display: flex;
    gap: 24px;
  }
  
  .footer .footer-nav a {
    color: #666;
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }
  
  .footer .footer-nav a:hover {
    color: #000;
  }
  
  .footer .footer-copyright {
    font-size: 13px;
    color: #666;
  }
  
  .footer .footer-social {
    display: flex;
    gap: 16px;
  }
  
  .footer .footer-social-link {
    color: #666;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: color 0.2s;
  }
  
  .footer .footer-social-link:hover {
    color: #000;
  }
  
  .footer .footer-version {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #999;
  }
  
  @media (max-width: 768px) {
    .footer {
      padding: 20px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
    }
    
    .footer .footer-inner {
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
  }
  
  @media (max-width: 640px) {
    .game-container .wa-hero-wrapper {
      width: calc(100% + 40px);
      margin: 0 -20px;
    }
    
    .game-container {
      padding: 0 20px 20px;
    }
  }
    .breadcrumb-inner { padding: 12px 20px; }
  }
</style>
