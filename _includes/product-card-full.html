<div class="product-card" onclick="window.location.href='{{ product.url | relative_url }}'">
  <div class="card-image" style="{% unless product.image %}background: {{ product.color }}{% endunless %}">
    {% if product.image %}
      <img src="{{ product.image | relative_url }}" alt="{{ product.title }}" class="card-image-img">
    {% else %}
      <span style="font-size: 48px;">{{ product.emoji }}</span>
    {% endif %}
    <span class="type-badge">{{ product.category }}</span>
  </div>
  <div class="card-content">
    <h3 class="card-title">{{ product.title }}</h3>
    <p class="card-desc">{{ product.description }}</p>
    <p class="card-date">{{ product.date | date: "%Y-%m-%d" }}</p>
  </div>
</div>
