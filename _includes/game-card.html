{% comment %}
Game Card Component
Usage: {% include game-card.html game=game %}
{% endcomment %}

<article class="work-card">
  <a href="{{ include.game.url | relative_url }}" class="game-card-link">
    <div class="work-image" style="background: {{ include.game.color | default: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' }};">
      {{ include.game.emoji | default: '🎮' }}
    </div>
    <div class="work-content">
      <h4>{{ include.game.title }}</h4>
      <p>{{ include.game.category }}</p>
    </div>
  </a>
</article>
