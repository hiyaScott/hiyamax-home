<div class="artwork-card" onclick="window.location.href='{{ artwork.url | relative_url }}'">
  <div class="card-image">
    {% if artwork.image %}
      {% assign img_base = artwork.image | remove: '.webp' | remove: '.jpg' | remove: '.png' %}
      <picture>
        <source srcset="{{ img_base }}.webp | relative_url" type="image/webp">
        <img src="{{ artwork.image | relative_url }}" alt="{{ artwork.title }}" loading="lazy" class="card-img">
      </picture>
    {% else %}
      <div class="card-bg" style="background: {{ artwork.color | default: 'linear-gradient(135deg, #2a2a3a 0%, #1a1a2e 100%)' }}">
        <span style="font-size: 48px;">{{ artwork.emoji | default: '🎨' }}</span>
      </div>
    {% endif %}
    <span class="type-badge">{{ artwork.category | default: 'Artwork' }}</span>
    <span class="year-badge">{{ artwork.year | default: '2025' }}</span>
  </div>
  <div class="card-content">
    <h3 class="card-title">{{ artwork.title }}</h3>
    <p class="card-meta">{{ artwork.description }}</p>
  </div>
</div>
